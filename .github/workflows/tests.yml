name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  # ─── Calidad estática: formato, lint, tipos y build ──────────────────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prettier check
        run: npm run format:check

      - name: Build (packages + services)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  # ─── Tests unitarios y de integración con cobertura ──────────────────────
  test:
    runs-on: ubuntu-latest
    env:
      TZ: America/Bogota

    strategy:
      matrix:
        node-version: [20.x]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_test
          POSTGRES_DB: postgres
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: beautyspot_test
          RABBITMQ_DEFAULT_PASS: test123
        ports:
          - 5673:5672
          - 15673:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build shared packages
        run: npm run build --workspace packages/shared-types --workspace packages/shared-utils --workspace packages/event-types --workspace packages/shared-constants --workspace packages/database --workspace packages/nest-common

      - name: Create test databases
        run: PGPASSWORD=postgres_test psql -h localhost -p 5434 -U postgres -f infra/docker/postgres/init-test.sql

      - name: Run tests (unit)
        run: npm run test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info,./packages/*/coverage/lcov.info,./services/*/coverage/lcov.info
          fail_ci_if_error: false

  # ─── Build de imágenes Docker (valida que cada Dockerfile construye) ──────
  docker-build:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: api-gateway, file: services/api-gateway/Dockerfile }
          - { name: auth-service, file: services/auth-service/Dockerfile }
          - { name: core-service, file: services/core-service/Dockerfile }
          - { name: booking-service, file: services/booking-service/Dockerfile }
          - { name: payment-service, file: services/payment-service/Dockerfile }
          - {
              name: notification-service,
              file: services/notification-service/Dockerfile,
            }
          - {
              name: marketplace-service,
              file: services/marketplace-service/Dockerfile,
            }
          - {
              name: analytics-service,
              file: services/analytics-service/Dockerfile,
            }
          - { name: frontend, file: apps/frontend/Dockerfile }
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: false
          tags: beautyspot-${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
